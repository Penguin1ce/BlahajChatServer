<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blahaj WS Tester</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --soft: #f9fafc;
        --line: #d9e0ea;
        --line-strong: #b9c3d2;
        --text: #172033;
        --muted: #647084;
        --accent: #2563eb;
        --accent-dark: #1d4ed8;
        --ok: #0f8a5f;
        --warn: #b76e00;
        --err: #c2413a;
        --ink: #111827;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        font-size: 14px;
        color: var(--text);
        background: var(--bg);
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        min-height: 36px;
        padding: 0 12px;
        border: 1px solid var(--accent);
        border-radius: 8px;
        color: #fff;
        background: var(--accent);
        cursor: pointer;
        white-space: nowrap;
      }

      button:hover {
        background: var(--accent-dark);
        border-color: var(--accent-dark);
      }

      button.secondary {
        color: var(--text);
        background: #fff;
        border-color: var(--line-strong);
      }

      button.secondary:hover {
        background: var(--soft);
      }

      button.danger {
        background: var(--err);
        border-color: var(--err);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      input,
      textarea,
      select {
        width: 100%;
        min-height: 36px;
        padding: 8px 10px;
        color: var(--text);
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      textarea {
        resize: vertical;
        line-height: 1.5;
        font-family: "SF Mono", "JetBrains Mono", Consolas, monospace;
        font-size: 13px;
      }

      input:focus,
      textarea:focus,
      select:focus {
        outline: 2px solid rgba(37, 99, 235, 0.16);
        border-color: var(--accent);
      }

      label {
        display: grid;
        gap: 6px;
        min-width: 0;
        color: var(--muted);
        font-size: 12px;
      }

      .app {
        width: min(1180px, calc(100% - 28px));
        margin: 14px auto 24px;
      }

      .topbar {
        display: grid;
        gap: 12px;
        margin-bottom: 12px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 8px;
        color: #fff;
        background: var(--ink);
        font-weight: 700;
      }

      .brand h1 {
        margin: 0;
        font-size: 18px;
      }

      .brand .sub {
        margin-top: 2px;
        color: var(--muted);
        font-size: 12px;
      }

      .status-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--soft);
        color: var(--muted);
      }

      .pill strong {
        margin-left: 4px;
        color: var(--text);
        font-weight: 650;
      }

      .pill.ok strong {
        color: var(--ok);
      }

      .pill.warn strong {
        color: var(--warn);
      }

      .pill.err strong {
        color: var(--err);
      }

      .flow {
        display: grid;
        gap: 12px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: hidden;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 42px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        background: var(--soft);
      }

      .panel-head h2 {
        margin: 0;
        font-size: 14px;
      }

      .step {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        margin-right: 8px;
        border-radius: 8px;
        color: #fff;
        background: var(--ink);
        font-size: 12px;
      }

      .panel-body {
        display: grid;
        gap: 12px;
        padding: 12px;
      }

      .fields {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .fields.three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .check {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 36px;
        color: var(--text);
        font-size: 13px;
      }

      .check input {
        width: 16px;
        min-height: 16px;
      }

      .token {
        min-height: 72px;
      }

      .content-box {
        min-height: 92px;
      }

      .raw-frame {
        min-height: 180px;
      }

      .timeline {
        min-height: 260px;
        max-height: 520px;
        overflow: auto;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .empty {
        display: grid;
        place-items: center;
        min-height: 180px;
        color: var(--muted);
        border: 1px dashed var(--line);
        border-radius: 8px;
        background: var(--soft);
      }

      .msg {
        display: grid;
        gap: 6px;
        margin-bottom: 10px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .msg.mine {
        border-color: rgba(37, 99, 235, 0.35);
        background: #f7faff;
      }

      .msg-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .msg-head b {
        color: var(--text);
      }

      .msg-content {
        line-height: 1.55;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .msg-meta {
        color: var(--muted);
        font-family: "SF Mono", "JetBrains Mono", Consolas, monospace;
        font-size: 11px;
        overflow-wrap: anywhere;
      }

      .log {
        min-height: 260px;
        max-height: 460px;
        overflow: auto;
        padding: 10px;
        border-radius: 8px;
        color: #e8edf6;
        background: #111827;
        font-family: "SF Mono", "JetBrains Mono", Consolas, monospace;
        font-size: 12px;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .log-line {
        margin: 0 0 10px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .log-line.ok {
        color: #bdf5d6;
      }

      .log-line.warn {
        color: #ffe2ad;
      }

      .log-line.err {
        color: #ffc7c2;
      }

      @media (max-width: 780px) {
        .app {
          width: min(100% - 16px, 1180px);
          margin-top: 8px;
        }

        .fields,
        .fields.three {
          grid-template-columns: 1fr;
        }

        .panel-head {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">WS</div>
          <div>
            <h1>Blahaj WebSocket Tester</h1>
            <div class="sub">按主链路顺序测试：登录、建会话、连接、发送、拉历史</div>
          </div>
        </div>
        <div class="status-row">
          <span class="pill" id="userPill">用户 <strong>未登录</strong></span>
          <span class="pill" id="convPill">会话 <strong>未选择</strong></span>
          <span class="pill" id="wsPill">WS <strong>未连接</strong></span>
          <span class="pill" id="seqPill">Seq <strong>1</strong></span>
        </div>
      </header>

      <section class="flow">
        <section class="panel">
          <div class="panel-head">
            <h2><span class="step">1</span>环境与登录</h2>
            <div class="actions">
              <button class="secondary" id="resetEnvBtn">重置环境</button>
              <button class="secondary" id="meBtn">校验 Me</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="fields">
              <label>
                HTTP Base URL
                <input id="httpBase" placeholder="http://127.0.0.1:8080" />
              </label>
              <label>
                WS URL
                <input id="wsURL" placeholder="ws://127.0.0.1:8080/ws/wslogin" />
              </label>
            </div>
            <div class="fields">
              <label>
                邮箱
                <input id="email" type="email" autocomplete="username" />
              </label>
              <label>
                密码
                <input id="password" type="password" autocomplete="current-password" />
              </label>
            </div>
            <label>
              Access Token
              <textarea class="token" id="token" placeholder="登录后自动填入，也可手动粘贴"></textarea>
            </label>
            <div class="actions">
              <button id="loginBtn">登录</button>
              <button class="secondary" id="clearAuthBtn">清空 Token</button>
              <label class="check">
                <input id="autoConnect" type="checkbox" checked />
                登录后自动连接 WS
              </label>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2><span class="step">2</span>创建或选择会话</h2>
            <button id="createC2CBtn">创建/获取 C2C</button>
          </div>
          <div class="panel-body">
            <div class="fields">
              <label>
                Peer UID
                <input id="peerUID" inputmode="numeric" placeholder="对方用户 ID" />
              </label>
              <label>
                Conv ID
                <input id="convID" placeholder="创建单聊后自动填入，也可手动粘贴" />
              </label>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2><span class="step">3</span>WebSocket 连接</h2>
            <button class="secondary" id="pingBtn">Ping</button>
          </div>
          <div class="panel-body">
            <div class="actions">
              <button id="connectBtn">连接 WS</button>
              <button class="danger" id="disconnectBtn">断开</button>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2><span class="step">4</span>发送消息</h2>
            <button class="secondary" id="newClientMsgIDBtn">生成新 ClientMsgID</button>
          </div>
          <div class="panel-body">
            <div class="fields three">
              <label>
                Type
                <select id="msgType">
                  <option value="text">text</option>
                  <option value="image">image</option>
                  <option value="file">file</option>
                  <option value="audio">audio</option>
                </select>
              </label>
              <label>
                Client Msg ID
                <input id="clientMsgID" />
              </label>
              <label>
                文本
                <input id="textMessage" placeholder="hello" />
              </label>
            </div>
            <label>
              Content JSON
              <textarea class="content-box" id="contentJSON">{&#10;  "text": "hello"&#10;}</textarea>
            </label>
            <div class="actions">
              <button id="sendTextBtn">发送文本</button>
              <button class="secondary" id="sendCustomBtn">发送 JSON</button>
              <button class="secondary" id="repeatLastBtn">重发上一帧</button>
              <button class="secondary" id="fillRawBtn">填入原始帧</button>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2><span class="step">5</span>拉历史消息</h2>
            <div class="actions">
              <button id="loadHistoryBtn">拉最新</button>
              <button class="secondary" id="loadOlderBtn">加载更早</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="fields">
              <label>
                before_id
                <input id="beforeID" inputmode="numeric" placeholder="0" />
              </label>
              <label>
                limit
                <input id="historyLimit" inputmode="numeric" value="20" />
              </label>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2><span class="step">6</span>消息流</h2>
            <button class="secondary" id="clearTimelineBtn">清空消息流</button>
          </div>
          <div class="panel-body">
            <div class="timeline" id="timeline"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2><span class="step">7</span>原始帧</h2>
            <div class="actions">
              <button class="secondary" id="resetRawBtn">生成模板</button>
              <button class="secondary" id="copyRawBtn">复制</button>
            </div>
          </div>
          <div class="panel-body">
            <textarea class="raw-frame" id="rawFrame"></textarea>
            <div class="actions">
              <button id="sendRawBtn">发送原始帧</button>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2><span class="step">8</span>事件日志</h2>
            <button class="secondary" id="clearLogBtn">清空日志</button>
          </div>
          <div class="panel-body">
            <div class="log" id="log"></div>
          </div>
        </section>
      </section>
    </main>

    <script>
      const storageKey = "blahaj_ws_tester_v3";
      const state = {
        socket: null,
        seq: 1,
        currentUserID: 0,
        currentUser: null,
        lastSendFrame: null,
        nextBeforeID: 0,
        messages: new Map(),
      };

      const el = {
        httpBase: document.getElementById("httpBase"),
        wsURL: document.getElementById("wsURL"),
        token: document.getElementById("token"),
        email: document.getElementById("email"),
        password: document.getElementById("password"),
        autoConnect: document.getElementById("autoConnect"),
        peerUID: document.getElementById("peerUID"),
        convID: document.getElementById("convID"),
        beforeID: document.getElementById("beforeID"),
        historyLimit: document.getElementById("historyLimit"),
        msgType: document.getElementById("msgType"),
        clientMsgID: document.getElementById("clientMsgID"),
        textMessage: document.getElementById("textMessage"),
        contentJSON: document.getElementById("contentJSON"),
        rawFrame: document.getElementById("rawFrame"),
        timeline: document.getElementById("timeline"),
        log: document.getElementById("log"),
        userPill: document.getElementById("userPill"),
        convPill: document.getElementById("convPill"),
        wsPill: document.getElementById("wsPill"),
        seqPill: document.getElementById("seqPill"),
        loadOlderBtn: document.getElementById("loadOlderBtn"),
      };

      function defaults() {
        if (window.location.protocol === "http:" || window.location.protocol === "https:") {
          const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
          return {
            httpBase: `${window.location.protocol}//${window.location.host}`,
            wsURL: `${wsProtocol}//${window.location.host}/ws/wslogin`,
          };
        }
        return {
          httpBase: "http://127.0.0.1:8080",
          wsURL: "ws://127.0.0.1:8080/ws/wslogin",
        };
      }

      function nowText() {
        return new Date().toLocaleTimeString("zh-CN", { hour12: false });
      }

      function pretty(value) {
        if (typeof value === "string") {
          return value;
        }
        return JSON.stringify(value, null, 2);
      }

      function log(kind, payload, tone = "") {
        const node = document.createElement("div");
        node.className = `log-line ${tone}`;
        node.textContent = `[${nowText()}] ${kind}\n${pretty(payload)}`;
        el.log.appendChild(node);
        el.log.scrollTop = el.log.scrollHeight;
      }

      function setPill(node, label, value, tone = "") {
        node.className = `pill ${tone}`;
        node.innerHTML = `${label} <strong>${value}</strong>`;
      }

      function refreshPills() {
        const userLabel = state.currentUserID ? String(state.currentUserID) : "未登录";
        const convLabel = el.convID.value.trim() || "未选择";
        const wsLabel = state.socket && state.socket.readyState === WebSocket.OPEN ? "已连接" : "未连接";
        setPill(el.userPill, "用户", userLabel, state.currentUserID ? "ok" : "");
        setPill(el.convPill, "会话", convLabel, convLabel === "未选择" ? "" : "ok");
        setPill(el.wsPill, "WS", wsLabel, wsLabel === "已连接" ? "ok" : "");
        setPill(el.seqPill, "Seq", String(state.seq), "");
      }

      function persist() {
        const snapshot = {
          httpBase: el.httpBase.value,
          wsURL: el.wsURL.value,
          token: el.token.value,
          email: el.email.value,
          autoConnect: el.autoConnect.checked,
          peerUID: el.peerUID.value,
          convID: el.convID.value,
          beforeID: el.beforeID.value,
          historyLimit: el.historyLimit.value,
          msgType: el.msgType.value,
          clientMsgID: el.clientMsgID.value,
          textMessage: el.textMessage.value,
          contentJSON: el.contentJSON.value,
          rawFrame: el.rawFrame.value,
          seq: state.seq,
          currentUserID: state.currentUserID,
        };
        localStorage.setItem(storageKey, JSON.stringify(snapshot));
        refreshPills();
      }

      function restore() {
        const base = defaults();
        const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");
        el.httpBase.value = saved.httpBase || base.httpBase;
        el.wsURL.value = saved.wsURL || base.wsURL;
        el.token.value = saved.token || "";
        el.email.value = saved.email || "";
        el.autoConnect.checked = saved.autoConnect !== false;
        el.peerUID.value = saved.peerUID || "";
        el.convID.value = saved.convID || "";
        el.beforeID.value = saved.beforeID || "";
        el.historyLimit.value = saved.historyLimit || "20";
        el.msgType.value = saved.msgType || "text";
        el.clientMsgID.value = saved.clientMsgID || crypto.randomUUID();
        el.textMessage.value = saved.textMessage || "";
        el.contentJSON.value = saved.contentJSON || '{\n  "text": "hello"\n}';
        el.rawFrame.value = saved.rawFrame || "";
        state.seq = Number(saved.seq) > 0 ? Number(saved.seq) : 1;
        state.currentUserID = Number(saved.currentUserID) || 0;
        if (!el.rawFrame.value) {
          fillRawTemplate();
        }
        refreshPills();
      }

      function nextSeq() {
        const seq = state.seq;
        state.seq += 1;
        persist();
        return seq;
      }

      function parseJSON(text, name) {
        try {
          return JSON.parse(text);
        } catch (error) {
          throw new Error(`${name} 不是合法 JSON: ${error.message}`);
        }
      }

      function httpBase() {
        return el.httpBase.value.trim().replace(/\/$/, "");
      }

      function token() {
        return el.token.value.trim();
      }

      async function api(path, options = {}) {
        const headers = { ...(options.headers || {}) };
        if (options.body && !headers["Content-Type"]) {
          headers["Content-Type"] = "application/json";
        }
        if (token()) {
          headers.Authorization = `Bearer ${token()}`;
        }
        const request = {
          ...options,
          headers,
          body: options.body && typeof options.body !== "string" ? JSON.stringify(options.body) : options.body,
        };
        const resp = await fetch(`${httpBase()}${path}`, request);
        const data = await resp.json().catch(() => ({}));
        log(`HTTP ${options.method || "GET"} ${path} -> ${resp.status}`, data, resp.ok ? "ok" : "err");
        if (!resp.ok) {
          throw new Error(data.message || data.error || `HTTP ${resp.status}`);
        }
        return data;
      }

      function setCurrentUser(user) {
        state.currentUser = user || null;
        state.currentUserID = user && user.id ? Number(user.id) : 0;
        persist();
      }

      async function login() {
        const body = {
          email: el.email.value.trim(),
          password: el.password.value,
        };
        log("HTTP POST /auth/login", { email: body.email });
        const data = await api("/auth/login", { method: "POST", body });
        const accessToken = data.data && data.data.token && data.data.token.access_token;
        if (!accessToken) {
          throw new Error("响应中没有 access_token");
        }
        el.token.value = accessToken;
        setCurrentUser(data.data.user);
        log("登录成功", data.data.user, "ok");
        if (el.autoConnect.checked) {
          connectWS();
        }
      }

      async function fetchMe() {
        const data = await api("/api/me");
        setCurrentUser(data.data.user);
        log("当前用户", data.data.user, "ok");
      }

      async function createC2C() {
        const peerUID = Number(el.peerUID.value.trim());
        if (!peerUID) {
          throw new Error("Peer UID 不能为空");
        }
        const data = await api("/api/conversations/c2c", {
          method: "POST",
          body: { peer_uid: peerUID },
        });
        const conv = data.data;
        if (!conv || !conv.conv_id) {
          throw new Error("响应中没有 conv_id");
        }
        el.convID.value = conv.conv_id;
        state.nextBeforeID = 0;
        persist();
        log("会话已选择", conv, "ok");
      }

      function convID() {
        const id = el.convID.value.trim();
        if (!id) {
          throw new Error("Conv ID 不能为空");
        }
        return id;
      }

      async function loadHistory(older) {
        const limit = Number(el.historyLimit.value) || 20;
        const beforeID = older ? state.nextBeforeID : Number(el.beforeID.value || 0);
        const params = new URLSearchParams();
        params.set("limit", String(limit));
        if (beforeID > 0) {
          params.set("before_id", String(beforeID));
        }
        const data = await api(`/api/conversations/${encodeURIComponent(convID())}/messages?${params}`);
        const page = data.data || { items: [] };
        if (!older) {
          state.messages.clear();
        }
        (page.items || []).forEach((msg) => upsertMessage(msg, "history"));
        state.nextBeforeID = Number(page.next_before_id) || 0;
        el.beforeID.value = state.nextBeforeID ? String(state.nextBeforeID) : "";
        el.loadOlderBtn.disabled = !page.has_more;
        persist();
        renderTimeline();
      }

      function connectWS() {
        if (!token()) {
          throw new Error("Access Token 不能为空");
        }
        if (state.socket && state.socket.readyState === WebSocket.OPEN) {
          log("WS 已连接", "跳过重复连接", "warn");
          return;
        }
        const url = new URL(el.wsURL.value.trim());
        url.searchParams.set("token", token());
        const socket = new WebSocket(url.toString());
        state.socket = socket;
        setPill(el.wsPill, "WS", "连接中", "warn");
        log("WS connect", url.toString());

        socket.addEventListener("open", () => {
          refreshPills();
          log("WS open", url.toString(), "ok");
        });

        socket.addEventListener("message", (event) => {
          const text = typeof event.data === "string" ? event.data : "[binary]";
          let frame = text;
          try {
            frame = JSON.parse(text);
          } catch (_) {
            // keep raw text
          }
          handleIncomingFrame(frame);
        });

        socket.addEventListener("close", (event) => {
          state.socket = null;
          refreshPills();
          log("WS close", { code: event.code, reason: event.reason || "" }, "warn");
        });

        socket.addEventListener("error", () => {
          setPill(el.wsPill, "WS", "异常", "err");
          log("WS error", "浏览器报告连接异常", "err");
        });
      }

      function disconnectWS() {
        if (state.socket) {
          state.socket.close(1000, "manual");
        }
      }

      function sendFrame(frame, rememberSend) {
        if (!state.socket || state.socket.readyState !== WebSocket.OPEN) {
          throw new Error("WebSocket 未连接");
        }
        state.socket.send(JSON.stringify(frame));
        if (rememberSend) {
          state.lastSendFrame = JSON.parse(JSON.stringify(frame));
        }
        log("WS send", frame);
      }

      function textContent() {
        const text = el.textMessage.value.trim();
        if (!text) {
          throw new Error("文本不能为空");
        }
        return { text };
      }

      function buildSendFrame(content) {
        const clientMsgID = el.clientMsgID.value.trim() || crypto.randomUUID();
        el.clientMsgID.value = clientMsgID;
        return {
          op: "send",
          seq: nextSeq(),
          data: {
            client_msg_id: clientMsgID,
            conv_id: convID(),
            type: el.msgType.value,
            content,
          },
        };
      }

      function sendText() {
        el.msgType.value = "text";
        const frame = buildSendFrame(textContent());
        sendFrame(frame, true);
        fillRawTemplate(frame);
        persist();
      }

      function sendCustom() {
        const frame = buildSendFrame(parseJSON(el.contentJSON.value, "Content JSON"));
        sendFrame(frame, true);
        fillRawTemplate(frame);
        persist();
      }

      function repeatLast() {
        if (!state.lastSendFrame) {
          throw new Error("还没有上一帧");
        }
        sendFrame(state.lastSendFrame, false);
      }

      function fillRawTemplate(frame) {
        const nextFrame =
          frame ||
          {
            op: "send",
            seq: state.seq,
            data: {
              client_msg_id: el.clientMsgID.value.trim() || crypto.randomUUID(),
              conv_id: el.convID.value.trim() || "conv_id",
              type: el.msgType.value || "text",
              content: parseJSON(el.contentJSON.value || '{"text":"hello"}', "Content JSON"),
            },
          };
        el.rawFrame.value = JSON.stringify(nextFrame, null, 2);
      }

      function sendRaw() {
        const frame = parseJSON(el.rawFrame.value, "Frame JSON");
        const isSend = frame && frame.op === "send";
        sendFrame(frame, isSend);
      }

      function handleIncomingFrame(frame) {
        log("WS recv", frame, typeof frame === "object" && frame.op === "error" ? "err" : "ok");
        if (!frame || typeof frame !== "object") {
          return;
        }
        if (frame.op === "ackok") {
          log("ACK", frame.data || {}, "ok");
          return;
        }
        if (frame.op === "msg" && frame.data) {
          upsertMessage(frame.data, "ws");
          renderTimeline();
        }
      }

      function upsertMessage(raw, origin) {
        const key = raw.msg_id || raw.client_msg_id || `${origin}:${Date.now()}:${Math.random()}`;
        const existing = state.messages.get(key) || {};
        state.messages.set(key, {
          ...existing,
          ...raw,
          origin,
        });
      }

      function contentText(content) {
        if (typeof content === "string") {
          try {
            content = JSON.parse(content);
          } catch (_) {
            return content;
          }
        }
        if (content && typeof content === "object" && typeof content.text === "string") {
          return content.text;
        }
        return JSON.stringify(content, null, 2);
      }

      function tsText(value) {
        if (!value) {
          return "";
        }
        return new Date(Number(value)).toLocaleString("zh-CN", { hour12: false });
      }

      function renderTimeline() {
        const list = Array.from(state.messages.values()).sort((a, b) => {
          const ta = Number(a.created_at || 0);
          const tb = Number(b.created_at || 0);
          if (ta !== tb) {
            return ta - tb;
          }
          return Number(a.id || 0) - Number(b.id || 0);
        });

        el.timeline.innerHTML = "";
        if (list.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "暂无消息";
          el.timeline.appendChild(empty);
          return;
        }

        list.forEach((msg) => {
          const node = document.createElement("article");
          const mine = state.currentUserID && Number(msg.from_uid) === Number(state.currentUserID);
          node.className = `msg ${mine ? "mine" : ""}`;

          const head = document.createElement("div");
          head.className = "msg-head";
          const left = document.createElement("span");
          left.innerHTML = `<b>${mine ? "我" : `UID ${msg.from_uid || "-"}`}</b> · ${msg.type || "-"}`;
          const right = document.createElement("span");
          right.textContent = tsText(msg.created_at);
          head.append(left, right);

          const body = document.createElement("div");
          body.className = "msg-content";
          body.textContent = contentText(msg.content);

          const meta = document.createElement("div");
          meta.className = "msg-meta";
          meta.textContent = `id=${msg.id || "-"} msg_id=${msg.msg_id || "-"} source=${msg.origin || "-"}`;

          node.append(head, body, meta);
          el.timeline.appendChild(node);
        });
        el.timeline.scrollTop = el.timeline.scrollHeight;
      }

      function newClientMsgID() {
        el.clientMsgID.value = crypto.randomUUID();
        persist();
      }

      function clearToken() {
        el.token.value = "";
        setCurrentUser(null);
      }

      function resetEnv() {
        const base = defaults();
        el.httpBase.value = base.httpBase;
        el.wsURL.value = base.wsURL;
        persist();
      }

      async function copyRaw() {
        await navigator.clipboard.writeText(el.rawFrame.value);
        log("复制原始帧", "已复制", "ok");
      }

      function bind(id, event, fn) {
        document.getElementById(id).addEventListener(event, async () => {
          try {
            await fn();
          } catch (error) {
            log("错误", error.message, "err");
          }
        });
      }

      bind("resetEnvBtn", "click", resetEnv);
      bind("loginBtn", "click", login);
      bind("meBtn", "click", fetchMe);
      bind("clearAuthBtn", "click", clearToken);
      bind("createC2CBtn", "click", createC2C);
      bind("loadHistoryBtn", "click", () => loadHistory(false));
      bind("loadOlderBtn", "click", () => loadHistory(true));
      bind("connectBtn", "click", connectWS);
      bind("disconnectBtn", "click", disconnectWS);
      bind("pingBtn", "click", () => sendFrame({ op: "ping", seq: nextSeq() }));
      bind("newClientMsgIDBtn", "click", newClientMsgID);
      bind("sendTextBtn", "click", sendText);
      bind("sendCustomBtn", "click", sendCustom);
      bind("repeatLastBtn", "click", repeatLast);
      bind("fillRawBtn", "click", () => fillRawTemplate());
      bind("resetRawBtn", "click", () => fillRawTemplate());
      bind("sendRawBtn", "click", sendRaw);
      bind("copyRawBtn", "click", copyRaw);
      bind("clearTimelineBtn", "click", () => {
        state.messages.clear();
        renderTimeline();
      });
      bind("clearLogBtn", "click", () => {
        el.log.innerHTML = "";
      });

      [
        el.httpBase,
        el.wsURL,
        el.token,
        el.email,
        el.autoConnect,
        el.peerUID,
        el.convID,
        el.beforeID,
        el.historyLimit,
        el.msgType,
        el.clientMsgID,
        el.textMessage,
        el.contentJSON,
        el.rawFrame,
      ].forEach((node) => node.addEventListener("input", persist));

      el.autoConnect.addEventListener("change", persist);
      el.convID.addEventListener("input", refreshPills);
      restore();
      renderTimeline();
      log("初始化", {
        http_base: el.httpBase.value,
        ws_url: el.wsURL.value,
      });
    </script>
  </body>
</html>
